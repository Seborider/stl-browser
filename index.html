<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>STL Browser</title>
    <script>
      // Pre-paint apply so the first frame matches the persisted theme.
      // SQLite is the source of truth; this localStorage read is a cache that
      // useTheme reconciles after mount. Key kept in sync with THEME_LS_KEY.
      (function () {
        var stored = null;
        try {
          stored = localStorage.getItem("stl-browser:theme");
        } catch (e) {}
        var mode =
          stored === "light" || stored === "dark" || stored === "system"
            ? stored
            : "system";
        var dark =
          mode === "dark" ||
          (mode === "system" &&
            window.matchMedia("(prefers-color-scheme: dark)").matches);
        if (dark) document.documentElement.classList.add("dark");
      })();
    </script>
    <style>
      html,
      body {
        background-color: #ffffff;
      }
      html.dark,
      html.dark body {
        background-color: #0a0a0a;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
